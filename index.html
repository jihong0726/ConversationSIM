    </style>
</head>
<body>

<div class="container">
    
    <div id="setup-view">
        <div class="setup-header">
            <h2>对话演练 V6</h2>
            <p>已预设完美剧本，可直接开始，或在下方修改</p>
        </div>
        
        <div class="timeline-builder">
            <div class="quick-import-area">
                <h4>极客模式：快速导入 JSON 剧本</h4>
                <textarea id="json-import-input" placeholder='[{"type":"auto", "role":"客户", "content":"你好", "delay":1}]'></textarea>
                <button onclick="importJSON()">一键导入覆盖</button>
            </div>
            
            <div id="timeline-container"></div>

            <div class="add-btns">
                <button class="btn-outline" onclick="addStep('auto')">➕ 添加对方发言</button>
                <button class="btn-outline" onclick="addStep('manual')">🗣️ 添加我方回复(需手打)</button>
            </div>
        </div>

        <button class="start-drill-btn" onclick="startDrill()">🚀 准备完毕，立即开始演练</button>
    </div>

    <div id="drill-view">
        <div id="dashboard-header">
            <div class="timer-badge">⏱ <span id="elapsed-time">00:00</span></div>
            <button id="reset-btn" class="reset-btn" onclick="resetDrill()">↩ 返回设置 / 重新开始</button>
        </div>
        
        <div id="chat-box"></div>

        <div id="input-area">
            <input type="text" id="chat-input" placeholder="系统演练中，不可输入..." disabled autocomplete="off">
            <button id="send-btn" disabled>发送</button>
        </div>
    </div>

</div>

<script>
    // 默认提供一个高度实用的精简剧本，降低前置准备难度
    let scriptSteps = [
        { id: 1, type: 'auto', role: '客户', content: '您好，我提现的资金一直没到账，怎么回事？', delay: 1 },
        { id: 2, type: 'manual', role: '客服', instruction: '请安抚客户并告知正在查询中' },
        { id: 3, type: 'auto', role: '客户', content: '那大概还需要等多久？', delay: 2 }
    ];

    // --- 极简配置面板渲染逻辑 ---
    function renderTimeline() {
        const container = document.getElementById('timeline-container');
        container.innerHTML = '';

        scriptSteps.forEach((step, index) => {
            const card = document.createElement('div');
            card.className = `step-card ${step.type === 'auto' ? 'auto-step' : 'manual-step'}`;
            
            if (step.type === 'auto') {
                card.innerHTML = `
                    <div class="step-header">
                        <span style="color:#52C41A">第 ${index + 1} 步：系统自动触发</span>
                        <div class="step-actions">
                            <span class="step-action-btn" onclick="moveStep(${index}, -1)" title="上移">↑</span>
                            <span class="step-action-btn" onclick="moveStep(${index}, 1)" title="下移">↓</span>
                            <span class="step-action-btn" onclick="duplicateStep(${index})" title="复制">⧉</span>
                            <span class="step-action-btn" onclick="insertStepAfter(${index}, '${step.type}')" title="在下方插入">＋</span>
                            <span class="step-action-sep"></span>
                            <span class="step-action-btn danger" onclick="deleteStep(${step.id})" title="删除">删除</span>
                        </div>
                    </div>
                    <div class="step-row">
                        扮演 <select onchange="updateStep(${step.id}, 'role', this.value)">
                            <option value="客户" ${step.role === '客户' ? 'selected' : ''}>客户</option>
                            <option value="客服" ${step.role === '客服' ? 'selected' : ''}>客服</option>
                        </select>
                        ，等待 <input type="number" min="0" value="${step.delay}" onchange="updateStep(${step.id}, 'delay', this.value)"> 秒后发送：
                    </div>
                    <div class="step-row">
                        <input type="text" value="${step.content || ''}" placeholder="输入文本内容..." onchange="updateStep(${step.id}, 'content', this.value)">
                    </div>
                `;
            } else {
                card.innerHTML = `
                    <div class="step-header">
                        <span style="color:var(--primary-color)">第 ${index + 1} 步：等待实战手动输入</span>
                        <div class="step-actions">
                            <span class="step-action-btn" onclick="moveStep(${index}, -1)" title="上移">↑</span>
                            <span class="step-action-btn" onclick="moveStep(${index}, 1)" title="下移">↓</span>
                            <span class="step-action-btn" onclick="duplicateStep(${index})" title="复制">⧉</span>
                            <span class="step-action-btn" onclick="insertStepAfter(${index}, '${step.type}')" title="在下方插入">＋</span>
                            <span class="step-action-sep"></span>
                            <span class="step-action-btn danger" onclick="deleteStep(${step.id})" title="删除">删除</span>
                        </div>
                    </div>
                    <div class="step-row">
                        我要扮演 <select onchange="updateStep(${step.id}, 'role', this.value)">
                            <option value="客服" ${step.role === '客服' ? 'selected' : ''}>客服</option>
                            <option value="客户" ${step.role === '客户' ? 'selected' : ''}>客户</option>
                        </select>
                    </div>
                    <div class="step-row">
                        输入框任务提示：<input type="text" value="${step.instruction || ''}" placeholder="例如：向客户道歉..." onchange="updateStep(${step.id}, 'instruction', this.value)">
                    </div>
                `;
            }
            container.appendChild(card);
        });
    }

    function addStep(type) {
        const newId = Date.now();
        if (type === 'auto') scriptSteps.push({ id: newId, type: 'auto', role: '客户', content: '', delay: 1 });
        else scriptSteps.push({ id: newId, type: 'manual', role: '客服', instruction: '请输入...' });
        renderTimeline();
    }

    function deleteStep(id) { 
        scriptSteps = scriptSteps.filter(s => s.id !== id); 
        renderTimeline(); 
    }

    function updateStep(id, field, value) { 
        const step = scriptSteps.find(s => s.id === id); 
        if (step) step[field] = field === 'delay' ? Number(value) : value; 
    }

    // ===== 新增：排序 / 插入 / 复制（尽量不改 UI，仅加功能） =====
    function moveStep(index, delta) {
        const newIndex = index + delta;
        if (newIndex < 0 || newIndex >= scriptSteps.length) return;

        const temp = scriptSteps[index];
        scriptSteps[index] = scriptSteps[newIndex];
        scriptSteps[newIndex] = temp;
        renderTimeline();
    }

    function duplicateStep(index) {
        const original = scriptSteps[index];
        if (!original) return;

        const copy = JSON.parse(JSON.stringify(original));
        copy.id = Date.now(); // 新 id
        scriptSteps.splice(index + 1, 0, copy);
        renderTimeline();
    }

    function insertStepAfter(index, preferType) {
        const newId = Date.now();
        const type = (preferType === 'manual' || preferType === 'auto') ? preferType : 'auto';

        const newStep = type === 'auto'
            ? { id: newId, type: 'auto', role: '客户', content: '', delay: 1 }
            : { id: newId, type: 'manual', role: '客服', instruction: '请输入...' };

        scriptSteps.splice(index + 1, 0, newStep);
        renderTimeline();
    }

    function importJSON() {
        try {
            const input = document.getElementById('json-import-input').value;
            const parsed = JSON.parse(input);
            scriptSteps = parsed.map((item, index) => ({ id: Date.now() + index, ...item }));
            renderTimeline();
            alert("导入成功！");
            document.getElementById('json-import-input').value = "";
        } catch(e) { alert("JSON 格式错误，请检查！"); }
    }

    renderTimeline();

    // --- 演练播放器核心逻辑 ---
    let isSimulating = false, timerInterval = null, secondsElapsed = 0, currentSleepReject = null;

    const getNowTime = () => {
        const d = new Date();
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    };

    const sleep = (ms) => new Promise((resolve, reject) => {
        const timeout = setTimeout(resolve, ms);
        currentSleepReject = () => { clearTimeout(timeout); reject(new Error("中断")); };
    });

    function startTimer() {
        secondsElapsed = 0; document.getElementById('elapsed-time').innerText = "00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0'), s = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('elapsed-time').innerText = `${m}:${s}`;
        }, 1000);
    }

    function renderMessage(role, content) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        const msgClass = role === '客服' ? 'service' : 'customer';
        const avatarIcon = role === '客服' ? '服' : '客';
        const statusIconHtml = role === '客服' ? `<div class="status-icon">✓</div>` : '';

        msgDiv.className = `message-row ${msgClass}`;
        msgDiv.innerHTML = `
            <div class="avatar ${msgClass}-avatar">${avatarIcon}</div>
            <div class="msg-content-wrapper">
                <div class="message-bubble">${content}${statusIconHtml}</div>
                <div class="msg-meta">${role} • ${getNowTime()}</div>
            </div>
        `;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function playTypingAnimation(delayMs, role) {
        if(delayMs <= 0 || !isSimulating) return;
        const chatBox = document.getElementById('chat-box');
        const indicatorId = 'typing-' + Date.now(), msgClass = role === '客服' ? 'service' : 'customer';
        const div = document.createElement('div');
        div.id = indicatorId; div.className = `message-row ${msgClass}`;
        div.innerHTML = `<div class="avatar ${msgClass}-avatar">${role==='客服'?'服':'客'}</div><div class="msg-content-wrapper"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
        chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
        try { await sleep(delayMs); } catch(e) {}
        const el = document.getElementById(indicatorId); if(el) el.remove();
    }

    function waitForUserReply(instruction) {
        return new Promise((resolve) => {
            const input = document.getElementById('chat-input'), btn = document.getElementById('send-btn');
            input.disabled = false; btn.disabled = false;
            input.placeholder = instruction || "请输入并发送...";
            input.focus();

            const submit = () => {
                const text = input.value.trim(); if(!text) return; 
                input.value = ''; input.disabled = true; btn.disabled = true; input.placeholder = "系统演练中，不可输入...";
                btn.removeEventListener('click', submit); input.removeEventListener('keypress', keypress);
                resolve(text);
            };
            const keypress = (e) => { if(e.key === 'Enter') submit(); };
            btn.addEventListener('click', submit); input.addEventListener('keypress', keypress);
        });
    }

    // --- 核心：重置与状态管理 ---
    function resetDrill() {
        // 1. 强制中断所有正在进行的等待和状态
        isSimulating = false;
        clearInterval(timerInterval);
        if (currentSleepReject) currentSleepReject();
        
        // 2. 彻底清空聊天记录
        document.getElementById('chat-box').innerHTML = '';
        
        // 3. 重置输入框状态
        const input = document.getElementById('chat-input'), btn = document.getElementById('send-btn');
        input.value = ''; input.disabled = true; btn.disabled = true; input.placeholder = "系统演练中，不可输入...";

        // 4. 切换回配置界面
        document.getElementById('drill-view').style.display = 'none';
        document.getElementById('setup-view').style.display = 'flex';
    }

    async function startDrill() {
        if (scriptSteps.length === 0) return alert("请至少添加一条剧本！");

        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('drill-view').style.display = 'flex';
        
        isSimulating = true;
        startTimer();

        for (const step of scriptSteps) {
            if (!isSimulating) break;
            if (step.type === 'manual') {
                const userInputText = await waitForUserReply(step.instruction);
                if(!isSimulating) break;
                renderMessage(step.role, userInputText);
            } else {
                await playTypingAnimation(step.delay * 1000, step.role);
                if(!isSimulating) break;
                renderMessage(step.role, step.content || "[空]");
            }
        }

        if (isSimulating) {
            clearInterval(timerInterval);
            document.getElementById('chat-input').placeholder = "演练已结束。可点击右上角返回配置。";
        }
    }
</script>
</body>
</html>
